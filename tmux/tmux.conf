set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g set-clipboard on
setw -g mode-keys vi
set -g xterm-keys on
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Thin uniform dim divider — no active highlight. tmux can't fully outline one
# pane: shared edges are drawn once, in one colour, so any active-border colour
# is half-baked on the shared top/bottom (tmux#1786, declined by design). The
# active pane is shown in the status bar instead — one connected pill (amber
# active block, gray rest) built by scripts/panepill.sh and called from
# status-format[0] via #(). It sees all panes at once, so end caps take the
# edge pane's colour (active edge → amber cap) and separators are a solid slant
# at colour changes, thin slant between passive blocks. Ignores the shared-edge
# rule and shows even over opaque apps (nvim).
# A lone pane has no border. Seams stay clean while WezTerm line_height = 1.0
# (a non-1.0 value splits box-drawing at every row boundary; wezterm #584).
set -g pane-border-lines single
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#3b4261'
set -g pane-border-status off
set -g pane-border-indicators off
# Kill the stale hook that re-applies the top border. An older config set a
# window-layout-changed hook doing `setw pane-border-status top` on every layout
# change (split/kill) — so the top border "popped back" on each pane create/close.
# source-file never removes hooks the file stops defining, so it survived every
# reload; this unset clears it for good. Verified: with it gone, split/kill no
# longer touches pane-border-status.
set-hook -g -u window-layout-changed
# Clear any window-level pane-border-status=top the stale hook already left on
# existing windows (setw at window scope overrides the global off and also
# survives reloads). ## escapes #{} for the inner tmux; -b defers past source-file
# (a synchronous tmux call would deadlock mid-source).
run-shell -b 'tmux list-windows -a -F "##{session_name}:##{window_index}" 2>/dev/null | while IFS= read -r w; do tmux setw -t "$w" -u pane-border-status 2>/dev/null; done'

# New sessions get random names (tmux defaults to 0, 1, 2…)
set-hook -g session-created 'run-shell "$HOME/.config/tmux/scripts/name-if-default.sh session #{session_name}"'

# Auto-name windows after the active pane's folder (lowercased). automatic-rename
# is off (tmux has no native lowercase, and #{...} inside #(...) is unreliable in
# this build, so a hook + lowername.sh queries the path itself).
#
# Names update ONLY on window switch / window creation, NOT on intra-window pane
# switches — otherwise a multi-pane window whose panes sit in different folders
# flips its name on every pane switch. session-window-changed fires when the
# session's active window changes (select-window/next/prev/prefix N, and new-window
# that becomes active). window-linked fires when a window is linked into a session
# (new-window incl. -d, the first window of a new-session, link-window) — the cases
# session-window-changed misses. Both pass #{pane_id} (resolves to the active pane
# of the relevant window); their overlap on new-window is harmless (idempotent).
setw -g automatic-rename off
setw -g allow-rename on
setw -g automatic-rename-format '#{?pane_dead,[dead],#{b:pane_current_path}}'
set-hook -g session-window-changed 'run-shell "$HOME/.config/tmux/scripts/lowername.sh #{pane_id}"'
set-hook -g window-linked 'run-shell "$HOME/.config/tmux/scripts/lowername.sh #{pane_id}"'
# Clear the stale pane-focus-in hook: source-file never removes hooks the file
# stops defining (same trap as the window-layout-changed unset above), so without
# this a prior reload's pane-focus-in survives and keeps renaming on every pane
# switch (inert today only because focus-events is off).
set-hook -g -u pane-focus-in

# Pane navigation. No rename here — window names follow the active pane's folder
# only on window switch / creation (hooks above), so switching panes within a
# window leaves the name stable. (cd is handled by zsh chpwd.)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r o select-pane -t :.+

unbind r
bind -r r source-file "$HOME/.config/tmux/tmux.conf"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# C-b w: S:/W:/P: labels; shortcuts start at 1
unbind w
bind w choose-tree -Z -F '#{?session_format,S: #{session_name},window_format,W: #{b:pane_current_path},#{?pane_marked,#[reverse],}P: #{b:pane_current_path}#{?pane_active,*,}#{?pane_marked,M,}}' -K '#{e|+|:line,1}'

# Status bar — session pill left, plain window list right
set-hook -gu client-attached
set-hook -gu client-session-changed
set -g status on
set -g status-style 'bg=default,fg=default'
set -g status-left ''
set -g status-right ''
set -g status-justify right
# #() in status-format (here, scripts/panepill.sh) is re-run on the
# status-interval timer, not on every pane switch — so at the default 15s the
# pane pill lags far behind. 1s keeps it responsive; panepill.sh is ~10ms, so
# the per-second cost is negligible.
set -g status-interval 1
setw -g window-status-separator ''
setw -g window-status-format '#[fg=#a9b1d6,bg=default]#[fg=#1f2335,bg=#a9b1d6] #{window_name} #[fg=#a9b1d6,bg=default]#[default] '
setw -g window-status-current-format '#[fg=#9ece6a,bg=default]#[fg=#1f2335,bg=#9ece6a,bold] #{window_name} #[fg=#9ece6a,bg=default]#[default] '
# Two-line status at the TOP: status-format[0] is the content line (session pill
# left; window list then one connected per-pane pill (scripts/panepill.sh) right); status-format[1] is a transparent
# blank gap row (bg=default — invisible, since WezTerm and nvim share #1a1b26).
set -g status-position top
set -g status 2
set -g status-format[0] '#[align=left]#[fg=#7C3AED,bg=default]#[fg=#FFFBF5,bg=#7C3AED,bold]◉ #{session_name} #[fg=#7C3AED,bg=default]#[default,nobold] #[align=right]#{W:#{E:window-status-format},#{E:window-status-current-format}}#{?#{!=:#{window_panes},1}, #($HOME/.config/tmux/scripts/panepill.sh #{window_id}),}'
set -g status-format[1] '#[bg=default]'

# --- Session persistence (plugin-free; bundled scripts in scripts/) ---
# Auto-restore runs once per server start (guarded by @session-restored, which
# resets on server exit, so reloads don't re-fire it). Restore is CREATE-ONLY:
# it rebuilds saved sessions that are missing and never renames existing ones —
# so a stale save or bug can't corrupt live state (an earlier mutating version
# did exactly that). tmux's startup placeholder session is then removed (only if
# trivial and not in the save; non-trivial sessions are always spared).
# Auto-save loop fires every SESSION_SAVE_INTERVAL (900s), self-guarding against
# stacking on reload, and waits for restore to finish before its first save.
# Saves are ~/.cache state, not config — not part of the copy.
# Manual: prefix S saves, prefix R restores. Verify: scripts/session-restore.sh --selftest
run-shell -b "$HOME/.config/tmux/scripts/session-restore.sh auto"
run-shell -b "$HOME/.config/tmux/scripts/session-save-loop.sh"
bind S run-shell "$HOME/.config/tmux/scripts/session-save.sh" \; display "saved"
bind R run-shell "$HOME/.config/tmux/scripts/session-restore.sh" \; display "restored"
